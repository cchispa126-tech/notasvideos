<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bloc de Notas Cloud - PDF mejorado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .config-panel, .nota-form {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); background: #764ba2; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .notas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .nota-card {
            background: white;
            padding: 18px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .nota-card:hover { transform: translateY(-3px); }
        .nota-titulo {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        .nota-contenido {
            color: #555;
            margin-bottom: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .nota-contenido a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid #667eea;
        }
        @media (max-width: 768px) {
            .notas-grid { grid-template-columns: 1fr; }
            .nota-contenido a {
                display: block;
                padding: 10px;
                background: #f8f9fa;
                border-radius: 10px;
                margin: 8px 0;
            }
        }
        .nota-fecha { font-size: 0.75em; color: #999; margin-top: 12px; }
        .btn-eliminar { background: #dc3545; padding: 8px 16px; font-size: 13px; margin-top: 8px; }
        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: #28a745; }
        .sync-dot.syncing { background: #ffc107; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .empty-state { text-align: center; color: white; padding: 50px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 Bloc de Notas Cloud</h1>
        <p>Sincronización cada 10 segundos | Exporta tus notas a PDF con enlaces</p>
    </div>

    <div class="config-panel">
        <h3>⚙️ Configuración de GitHub</h3>
        <div class="config-group">
            <label>🔑 GitHub Token:</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        </div>
        <div class="config-group">
            <label>📁 ID del Gist:</label>
            <input type="text" id="gistId" placeholder="Déjalo vacío para crear uno nuevo">
        </div>
        <div class="btn-group">
            <button class="btn-sync" onclick="guardarConfiguracion()">💾 Guardar</button>
            <button onclick="sincronizarDesdeGitHub()">📥 Sincronizar ahora</button>
            <button onclick="subirAGitHub()">📤 Subir a GitHub</button>
        </div>
        <div id="statusMessage" class="status info">✅ Listo</div>
    </div>

    <div class="nota-form">
        <input type="text" id="titulo" placeholder="📌 Título">
        <textarea id="contenido" placeholder="✍️ Escribe aquí..."></textarea>
        <div class="btn-group">
            <button onclick="guardarNota()">💾 Guardar Nota</button>
            <button onclick="pegarYCerrar()" style="background: #17a2b8;">📋 Pegar, guardar y cerrar</button>
            <button onclick="cerrarVentana()" style="background: #6c757d;">❌ Cerrar</button>
            <button onclick="exportarPDF()" style="background: #dc3545;">📄 Exportar a PDF</button>
        </div>
    </div>

    <div id="notas-container" class="notas-grid"></div>
    <footer>🔗 Usa: ?token=TOKEN&gist=GIST_ID en la URL</footer>
</div>

<div class="sync-indicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">Local</span>
</div>

<script>
    let notas = [];
    let config = { token: '', gistId: '' };

    // ========== LEER PARÁMETROS DE LA URL ==========
    function cargarParametrosURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const tokenURL = urlParams.get('token');
        const gistURL = urlParams.get('gist');
        
        if (tokenURL) {
            document.getElementById('githubToken').value = tokenURL;
            config.token = tokenURL;
            localStorage.setItem('github_token', tokenURL);
            mostrarStatus('✅ Token cargado desde enlace', 'success');
        }
        if (gistURL) {
            document.getElementById('gistId').value = gistURL;
            config.gistId = gistURL;
            localStorage.setItem('github_gist_id', gistURL);
            mostrarStatus('✅ Gist cargado desde enlace', 'success');
        }
        
        if (config.token && config.gistId) {
            setTimeout(() => sincronizarDesdeGitHub(), 1000);
        }
    }

    // ========== EXPORTAR A PDF CON ENLACES ==========
    function exportarPDF() {
        if (notas.length === 0) {
            mostrarStatus('❌ No hay notas para exportar', 'error');
            return;
        }

        // Crear contenido HTML con enlaces
        let contenido = `
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Mis Notas</title>
                <style>
                    body { 
                        font-family: Arial, sans-serif; 
                        margin: 40px; 
                        line-height: 1.6; 
                    }
                    h1 { 
                        color: #667eea; 
                        text-align: center; 
                    }
                    .fecha { 
                        text-align: center; 
                        color: #666; 
                        margin-bottom: 30px; 
                    }
                    .nota { 
                        border: 1px solid #ddd; 
                        border-radius: 10px; 
                        padding: 15px; 
                        margin-bottom: 20px;
                        page-break-inside: avoid;
                    }
                    .nota-titulo { 
                        font-size: 1.2em; 
                        font-weight: bold; 
                        color: #333; 
                        margin-bottom: 8px; 
                    }
                    .nota-contenido { 
                        color: #555; 
                        margin-bottom: 8px; 
                        white-space: pre-wrap; 
                    }
                    .nota-contenido a {
                        color: #667eea;
                        text-decoration: underline;
                    }
                    .nota-fecha { 
                        font-size: 0.8em; 
                        color: #999; 
                    }
                    hr { 
                        margin: 20px 0; 
                    }
                </style>
            </head>
            <body>
                <h1>📝 Mis Notas</h1>
                <div class="fecha">Exportado el: ${new Date().toLocaleString()}</div>
                <hr>
        `;

        notas.forEach(nota => {
            // Convertir URLs a enlaces HTML
            let contenidoConEnlaces = escapeHtml(nota.contenido).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            contenidoConEnlaces = contenidoConEnlaces.replace(/\n/g, '<br>');
            
            contenido += `
                <div class="nota">
                    <div class="nota-titulo">${escapeHtml(nota.titulo)}</div>
                    <div class="nota-contenido">${contenidoConEnlaces}</div>
                    <div class="nota-fecha">📅 ${nota.fecha}</div>
                </div>
            `;
        });

        contenido += `
                <hr>
                <div style="text-align: center; color: #999; font-size: 0.8em;">
                    Generado desde Bloc de Notas Cloud
                </div>
            </body>
            </html>
        `;

        // Crear blob y descargar como HTML (se puede convertir a PDF luego)
        const blob = new Blob([contenido], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mis_notas_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        mostrarStatus('✅ Archivo HTML generado (los enlaces funcionan al abrirlo en navegador)', 'success');
    }

    function convertirUrlsAEnlaces(texto) {
        const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+|[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-zA-Z]{2,}(?:\/[^\s]*)?)/g;
        return texto.replace(urlRegex, function(url) {
            let urlCompleta = url;
            if (!urlCompleta.startsWith('http://') && !urlCompleta.startsWith('https://')) {
                urlCompleta = 'https://' + urlCompleta;
            }
            return `<a href="${urlCompleta}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    function pegarYCerrar() {
        navigator.clipboard.readText()
            .then(texto => {
                if (texto && texto.trim() !== '') {
                    document.getElementById('contenido').value = texto;
                    guardarNota();
                    setTimeout(() => window.close(), 500);
                } else {
                    mostrarStatus('❌ No hay nada copiado', 'error');
                }
            })
            .catch(() => mostrarStatus('❌ No se pudo leer el portapapeles', 'error'));
    }

    function cerrarVentana() {
        if (confirm('¿Cerrar esta pestaña?')) window.close();
    }

    function cargarConfiguracion() {
        cargarParametrosURL();
        
        const savedToken = localStorage.getItem('github_token');
        const savedGistId = localStorage.getItem('github_gist_id');
        
        if (savedToken && !config.token) {
            document.getElementById('githubToken').value = savedToken;
            config.token = savedToken;
        }
        if (savedGistId && !config.gistId) {
            document.getElementById('gistId').value = savedGistId;
            config.gistId = savedGistId;
        }
        
        cargarNotasLocales();
        if (config.token && config.gistId) sincronizarDesdeGitHub();
    }

    function guardarConfiguracion() {
        config.token = document.getElementById('githubToken').value;
        config.gistId = document.getElementById('gistId').value;
        if (config.token) localStorage.setItem('github_token', config.token);
        if (config.gistId) localStorage.setItem('github_gist_id', config.gistId);
        mostrarStatus('✅ Configuración guardada', 'success');
    }

    function cargarNotasLocales() {
        const notasGuardadas = localStorage.getItem('blocNotas');
        if (notasGuardadas) {
            notas = JSON.parse(notasGuardadas);
            mostrarNotas();
        }
    }

    function guardarNota() {
        const titulo = document.getElementById('titulo').value;
        const contenido = document.getElementById('contenido').value;
        if (!titulo && !contenido) return alert('📝 Escribe algo');
        
        const nota = {
            id: Date.now(),
            titulo: titulo || 'Sin título',
            contenido: contenido,
            fecha: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        
        notas.unshift(nota);
        guardarNotasLocales();
        document.getElementById('titulo').value = '';
        document.getElementById('contenido').value = '';
        mostrarNotas();
        actualizarSyncStatus('local');
        mostrarStatus('✅ Nota guardada', 'success');
        if (config.token && config.gistId) subirAGitHub();
    }

    function guardarNotasLocales() {
        localStorage.setItem('blocNotas', JSON.stringify(notas));
    }

    function eliminarNota(id) {
        if (confirm('¿Eliminar esta nota?')) {
            notas = notas.filter(nota => nota.id !== id);
            guardarNotasLocales();
            mostrarNotas();
            actualizarSyncStatus('local');
            mostrarStatus('🗑️ Nota eliminada', 'info');
            if (config.token && config.gistId) subirAGitHub();
        }
    }

    async function subirAGitHub() {
        if (!config.token) return;
        actualizarSyncStatus('syncing');
        const data = { description: 'Mis notas', public: false, files: { 'notas.json': { content: JSON.stringify(notas, null, 2) } } };
        try {
            let url = 'https://api.github.com/gists';
            let method = 'POST';
            if (config.gistId) { url = `https://api.github.com/gists/${config.gistId}`; method = 'PATCH'; }
            const response = await fetch(url, { method, headers: { 'Authorization': `token ${config.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if (response.ok) {
                if (!config.gistId && result.id) {
                    config.gistId = result.id;
                    localStorage.setItem('github_gist_id', result.id);
                    document.getElementById('gistId').value = result.id;
                }
                actualizarSyncStatus('synced');
            } else throw new Error(result.message);
        } catch (error) { actualizarSyncStatus('error'); }
    }

    async function sincronizarDesdeGitHub() {
        if (!config.token || !config.gistId) return;
        actualizarSyncStatus('syncing');
        try {
            const response = await fetch(`https://api.github.com/gists/${config.gistId}`, { headers: { 'Authorization': `token ${config.token}` } });
            if (response.ok) {
                const gist = await response.json();
                const notasContent = gist.files['notas.json']?.content;
                if (notasContent) {
                    const notasNube = JSON.parse(notasContent);
                    const notasExistentesIds = new Set(notas.map(n => n.id));
                    const nuevasNotas = notasNube.filter(n => !notasExistentesIds.has(n.id));
                    if (nuevasNotas.length > 0) {
                        notas = [...nuevasNotas, ...notas];
                        guardarNotasLocales();
                        mostrarNotas();
                        mostrarStatus(`🔄 ${nuevasNotas.length} notas nuevas`, 'success');
                    } else actualizarSyncStatus('synced');
                }
            }
        } catch (error) { actualizarSyncStatus('error'); }
    }

    function mostrarNotas() {
        const container = document.getElementById('notas-container');
        if (notas.length === 0) { container.innerHTML = '<div class="empty-state">✨ No hay notas. ¡Crea tu primera nota!</div>'; return; }
        container.innerHTML = notas.map(nota => `<div class="nota-card"><div class="nota-titulo">${escapeHtml(nota.titulo)}</div><div class="nota-contenido">${convertirUrlsAEnlaces(escapeHtml(nota.contenido))}</div><div class="nota-fecha">📅 ${nota.fecha}</div><button class="btn-eliminar" onclick="eliminarNota(${nota.id})">🗑️ Eliminar</button></div>`).join('');
    }

    function mostrarStatus(mensaje, tipo) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.textContent = mensaje;
        statusDiv.className = `status ${tipo}`;
        setTimeout(() => { if (statusDiv.className.includes(tipo)) { statusDiv.className = 'status info'; statusDiv.textContent = '✅ Listo'; } }, 3000);
    }

    function actualizarSyncStatus(estado) {
        const dot = document.getElementById('syncDot');
        const status = document.getElementById('syncStatus');
        switch(estado) {
            case 'syncing': dot.className = 'sync-dot syncing'; status.textContent = 'Sincronizando...'; break;
            case 'synced': dot.className = 'sync-dot'; dot.style.background = '#28a745'; status.textContent = 'Sincronizado ☁️'; break;
            case 'local': dot.className = 'sync-dot'; dot.style.background = '#ffc107'; status.textContent = 'Solo local 💾'; break;
            case 'error': dot.className = 'sync-dot'; dot.style.background = '#dc3545'; status.textContent = 'Error'; break;
        }
    }

    function escapeHtml(text) { 
        const div = document.createElement('div'); 
        div.textContent = text; 
        return div.innerHTML; 
    }

    document.addEventListener('keydown', function(e) { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (typeof guardarNota === 'function') guardarNota(); } });
    document.addEventListener('DOMContentLoaded', function() { const campoTexto = document.getElementById('contenido'); if (campoTexto) campoTexto.focus(); });

    setInterval(() => { if (config.token && config.gistId) sincronizarDesdeGitHub(); }, 10000);
    document.addEventListener('visibilitychange', function() { if (!document.hidden && config.token && config.gistId) sincronizarDesdeGitHub(); });

    cargarConfiguracion();
</script>
</body>
</html>
